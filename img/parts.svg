<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200" role="img" aria-label="Solar parts: clamp, cable and DCDB box">
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2845"/>
      <stop offset="1" stop-color="#081a2f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8edf2"/>
      <stop offset="0.5" stop-color="#b8c2cc"/>
      <stop offset="1" stop-color="#8a96a3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6bd6a"/>
      <stop offset="1" stop-color="#c99740"/>
    </linearGradient>
  </defs>
  <rect width="500" height="200" fill="url(#bgP)"/>
  <circle cx="430" cy="40" r="120" fill="#0d8a43" opacity="0.10"/>
  <circle cx="60" cy="180" r="100" fill="#d6a84f" opacity="0.08"/>

  <!-- DCDB box -->
  <g transform="translate(40,52)">
    <rect x="0" y="0" width="96" height="100" rx="8" fill="#10324f" stroke="#2a597f" stroke-width="2"/>
    <rect x="10" y="12" width="76" height="50" rx="4" fill="#0a2034" stroke="#2a597f" stroke-width="1.5"/>
    <!-- breakers -->
    <rect x="18" y="20" width="14" height="34" rx="2" fill="url(#metal)"/>
    <rect x="38" y="20" width="14" height="34" rx="2" fill="url(#metal)"/>
    <rect x="58" y="20" width="14" height="34" rx="2" fill="url(#gold)"/>
    <circle cx="25" cy="72" r="4" fill="#0d8a43"/>
    <circle cx="48" cy="72" r="4" fill="#d6a84f"/>
    <circle cx="71" cy="72" r="4" fill="#e8edf2"/>
    <text x="48" y="92" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#9fb4c7" text-anchor="middle">DCDB</text>
  </g>

  <!-- Mid clamp -->
  <g transform="translate(200,70)">
    <rect x="0" y="20" width="70" height="16" rx="3" fill="url(#metal)"/>
    <rect x="28" y="0" width="14" height="56" rx="3" fill="url(#metal)"/>
    <circle cx="35" cy="8" r="7" fill="url(#gold)"/>
    <circle cx="35" cy="8" r="3" fill="#8a6a1f"/>
    <text x="35" y="74" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#9fb4c7" text-anchor="middle">Clamp</text>
  </g>

  <!-- Cable coil -->
  <g transform="translate(330,60)">
    <path d="M10 30 q20 -25 40 0 q20 25 40 0" fill="none" stroke="#0d8a43" stroke-width="9" stroke-linecap="round"/>
    <path d="M10 52 q20 -25 40 0 q20 25 40 0" fill="none" stroke="#d6a84f" stroke-width="9" stroke-linecap="round"/>
    <path d="M10 74 q20 -25 40 0 q20 25 40 0" fill="none" stroke="#c23b3b" stroke-width="9" stroke-linecap="round"/>
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#9fb4c7" text-anchor="middle">Solar Cable</text>
  </g>
</svg>
