<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials & News | Diamond Solar Bikaner</title>
  <meta name="description" content="Customer testimonials and latest news from Diamond Solar Bikaner — solar subsidy updates, offers and announcements.">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="testimonials">

  <div id="site-top"></div>

  <!-- ============ TESTIMONIALS (running marquee) ============ -->
  <section>
    <div class="container">
      <div class="sec-header">
        <span class="eyebrow"><i class="fa-solid fa-star"></i> Customer Feedback</span>
        <h2>What Our Customers Say</h2>
      </div>
    </div>
    <div class="t-marquee"><div class="t-track" id="tTrack"></div></div>
    <div class="t-marquee" id="tMarquee2" style="margin-top:6px; display:none;"><div class="t-track" id="tTrack2"></div></div>
  </section>

  <!-- ============ VIDEO TESTIMONIALS (optional, from same sheet) ============ -->
  <section style="padding-top:0;" id="vtSection" hidden>
    <div class="container">
      <div class="sec-header">
        <span class="eyebrow"><i class="fa-solid fa-video"></i> Video Testimonials</span>
        <h2>Customers Khud Bata Rahe Hain</h2>
      </div>
      <div class="project-grid" id="vtGrid"></div>
    </div>
  </section>

  <!-- ============ NEWSLETTER / NEWS ============ -->
  <section style="padding-top:0;">
    <div class="container">
      <div class="sec-header">
        <span class="eyebrow"><i class="fa-solid fa-newspaper"></i> Newsletter &amp; Updates</span>
        <h2>Latest News &amp; Updates</h2>
        <p class="sub">Government subsidy updates, new product launches and company announcements.</p>
      </div>
      <div id="newsArea"><div class="loader"><i class="fa-solid fa-sun"></i>Updates load ho rahe hain…</div></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/config.js?v=10"></script>
  <script src="js/sheets.js?v=10"></script>
  <script src="js/layout.js?v=10"></script>
  <script>
    const C = SITE_CONFIG;

    /* ---------- Testimonials ---------- */
    const T_SAMPLE = [
      { name: "Ramesh Bishnoi", location: "Bikaner", rating: "5", feedback: "5kW system lagwaya — bill ₹4,500 se seedha zero! Subsidy ka pura paperwork Diamond Solar ne kiya." },
      { name: "Suresh Tak", location: "Nokha", rating: "5", feedback: "Structure quality bahut badhiya, hot-dip galvanized. Installation team professional thi." },
      { name: "Anita Sharma", location: "Bikaner", rating: "5", feedback: "ACDB/DCDB aur clamps wholesale rate par mile. Genuine material, time par delivery." },
      { name: "Mohd. Irfan", location: "Sri Dungargarh", rating: "5", feedback: "3kW residential plant — ₹78,000 subsidy bhi mil gayi. Net metering bhi inhone hi karwaya." },
      { name: "Vikram Rathore", location: "Bikaner", rating: "4", feedback: "Commercial 25kW plant time par complete hua. Service response bhi fast hai." }
    ];

    function tCard(r) {
      const stars = '★'.repeat(Math.min(5, parseInt(r.rating) || 5));
      const initial = (r.name || 'C').charAt(0).toUpperCase();
      const avatar = r.photo ? `<img src="${imageURL(r.photo)}" alt="">` : initial;
      return `<div class="t-card">
        <div class="t-stars">${stars}</div>
        <p class="t-text">${escapeHTML(r.feedback || r.review || '')}</p>
        <div class="t-person"><div class="t-avatar">${avatar}</div>
        <div><b>${escapeHTML(r.name || '')}</b><span>${escapeHTML(r.location || '')}</span></div></div>
      </div>`;
    }

    function fillTrack(id, rows) {
      const track = document.getElementById(id);
      if (!track || !rows.length) return;
      const html = rows.map(tCard).join('');
      // Duplicate exactly once for seamless loop
      track.innerHTML = html + html;
      track.style.setProperty('--t-speed', Math.max(25, rows.length * 8) + 's');
    }

    (async () => {
      let rows = await fetchSheet(C.TAB_TESTIMONIALS);
      if (!rows || !rows.length) rows = T_SAMPLE;

      const textRows = rows.filter(r => !r.video);

      if (textRows.length <= 5) {
        // 5 tak — single line
        fillTrack('tTrack', textRows);
      } else {
        // 5 se zyada — equally 2 lines me bant do, NO repeat across lines
        // e.g. 13 => 7 + 6, 8 => 4 + 4, 9 => 5 + 4
        const half = Math.ceil(textRows.length / 2);
        fillTrack('tTrack', textRows.slice(0, half));
        document.getElementById('tMarquee2').style.display = '';
        fillTrack('tTrack2', textRows.slice(half));
      }

      // Video testimonials
      const vids = rows.filter(r => r.video);
      if (vids.length) {
        document.getElementById('vtSection').hidden = false;
        document.getElementById('vtGrid').innerHTML = vids.map(r => `
          <div class="card">
            <div class="media-box">${mediaHTML(r.video, r.name)}</div>
            <div class="pcard-body"><h3>${escapeHTML(r.name || '')}</h3><p>${escapeHTML(r.location || '')}</p></div>
          </div>`).join('');
      }
    })();

    /* ---------- Newsletter (newest first) ---------- */
    const N_SAMPLE = [
      { date: "05/06/2026", title: "PM Surya Ghar Subsidy — Naya Update", content: "3kW tak ke residential systems par ₹78,000 tak ki subsidy jaari hai. Application me 15-20 din lag rahe hain, jaldi apply karein.", link: "" },
      { date: "20/05/2026", title: "Summer Offer: Free Earthing Kit", content: "Is mahine 3kW+ installation par earthing kit bilkul free. Limited period offer — site survey aaj hi book karein.", link: "" },
      { date: "02/04/2026", title: "New Stock: Havells ACDB/DCDB", content: "Havells ke factory pre-wired ACDB aur DCDB panels ab warehouse me available — wholesale rates par installers ke liye.", link: "" }
    ];

    (async () => {
      let rows = await fetchSheet(C.TAB_NEWSLETTER);
      if (!rows || !rows.length) rows = N_SAMPLE;
      rows.sort((a, b) => parseDateLoose(b.date) - parseDateLoose(a.date)); // RECENT FIRST
      const itemsHTML = rows.map((r, i) => `
        <div class="news-item">
          <span class="news-date"><i class="fa-regular fa-calendar"></i> ${formatDate(r.date)}${i === 0 ? '<span class="badge-new">NEW</span>' : ''}</span>
          <h4>${escapeHTML(r.title || '')}</h4>
          <p>${escapeHTML(r.content || r.description || '')}</p>
          ${r.link ? `<a class="more" href="${escapeHTML(r.link)}" target="_blank" rel="noopener">Read more <i class="fa-solid fa-arrow-right"></i></a>` : ''}
        </div>`).join('');

      if (rows.length >= 3) {
        // Vertical auto-scroll (bottom to top), duplicated for seamless loop
        document.getElementById('newsArea').innerHTML =
          `<div class="news-vmarquee"><div class="news-vtrack" style="--n-speed:${Math.max(20, rows.length * 7)}s">
            <div class="news-list">${itemsHTML}</div>
            <div class="news-list" aria-hidden="true">${itemsHTML}</div>
          </div></div>`;
      } else {
        // Too few items — static list
        document.getElementById('newsArea').innerHTML = `<div class="news-list">${itemsHTML}</div>`;
      }
    })();
  </script>
</body>
</html>
