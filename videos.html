<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects & Gallery | Diamond Solar Bikaner</title>
  <meta name="description" content="Installed solar project videos and photos by Diamond Solar Bikaner — residential and commercial rooftop installations.">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="videos">

  <div id="site-top"></div>

  <!-- ============ PROJECT VIDEOS ============ -->
  <section>
    <div class="container">
      <div class="sec-header">
        <span class="eyebrow"><i class="fa-solid fa-video"></i> Live Project Videos</span>
        <h2>Installed Projects — Khud Dekhein</h2>
        <p class="sub">Hamare installed solar plants ke real videos. YouTube ya Google Drive — dono se automatic play hote hain.</p>
      </div>
      <div id="videoArea"><div class="loader"><i class="fa-solid fa-sun"></i>Videos load ho rahe hain…</div></div>
    </div>
  </section>

  <!-- ============ PHOTO GALLERY ============ -->
  <section style="padding-top:0;">
    <div class="container">
      <div class="sec-header">
        <span class="eyebrow"><i class="fa-solid fa-images"></i> Photo Gallery</span>
        <h2>Site Photos</h2>
      </div>
      <div id="photoArea"></div>
    </div>
  </section>

  <div class="lightbox" id="lightbox"><button class="lb-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button><img id="lbImg" alt=""></div>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const C = SITE_CONFIG;

    const SAMPLE = [
      { type: "video", link: "https://www.youtube.com/watch?v=xKxrkht7CpY", title: "6.2kW Rooftop Solar Install", location: "Bikaner Operational Site", description: "On-grid plant active and delivering optimal daily output." },
      { type: "video", link: "https://www.youtube.com/watch?v=lQpse2Wnvgk", title: "Commercial Plant - 02", location: "Industrial Area Bikaner", description: "High performance structural module system for commercial network." },
      { type: "photo", link: "https://images.unsplash.com/photo-1509391366360-2e959784a276?auto=format&fit=crop&w=800&q=80", title: "Residential 5kW Setup", location: "Bikaner" },
      { type: "photo", link: "https://images.unsplash.com/photo-1497440001374-f26997328c1b?auto=format&fit=crop&w=800&q=80", title: "Panel Array Closeup", location: "Nokha" },
      { type: "photo", link: "https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?auto=format&fit=crop&w=800&q=80", title: "Structure Installation", location: "Bikaner" }
    ];

    function isVideoRow(r) {
      const t = (r.type || "").toLowerCase();
      if (t) return t.startsWith("v"); // "video"
      const m = parseMediaLink(r.link || r.url || "");
      return m.type === "youtube" || m.type === "drive" || m.type === "video";
    }

    function renderAll(rows) {
      const videos = rows.filter(isVideoRow);
      const photos = rows.filter(r => !isVideoRow(r));

      // Videos — grid auto-adjusts to however many rows exist in the Sheet
      const vArea = document.getElementById('videoArea');
      vArea.innerHTML = videos.length ? `<div class="project-grid">` + videos.map(r => `
        <div class="card">
          <div class="media-box">${mediaHTML(r.link || r.url, r.title)}</div>
          <div class="pcard-body">
            ${r.location ? `<span class="p-loc"><i class="fa-solid fa-location-dot"></i> ${escapeHTML(r.location)}</span>` : ''}
            <h3>${escapeHTML(r.title || 'Solar Project')}</h3>
            ${r.description ? `<p>${escapeHTML(r.description)}</p>` : ''}
          </div>
        </div>`).join('') + `</div>`
        : `<div class="empty-note">Abhi koi project video nahi — Google Sheet ke "Projects" tab me link add karte hi yahan dikhega.</div>`;

      // Photos
      const pArea = document.getElementById('photoArea');
      pArea.innerHTML = photos.length ? `<div class="gallery-grid">` + photos.map(r => {
        const src = imageURL(r.link || r.url);
        return `<div class="gallery-item" data-full="${src}">
          <img src="${src}" alt="${escapeHTML(r.title || 'Site photo')}" loading="lazy">
          ${r.title ? `<div class="cap"><i class="fa-solid fa-location-dot" style="color:var(--primary)"></i> ${escapeHTML(r.title)}${r.location ? ' — ' + escapeHTML(r.location) : ''}</div>` : ''}
        </div>`;
      }).join('') + `</div>`
        : `<div class="empty-note">Abhi koi photo nahi — Sheet me photo link add karte hi yahan dikhegi.</div>`;

      // Lightbox
      const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lbImg');
      document.querySelectorAll('.gallery-item').forEach(g => g.addEventListener('click', () => {
        lbImg.src = g.dataset.full; lb.classList.add('show');
      }));
      lb.addEventListener('click', e => { if (e.target !== lbImg) lb.classList.remove('show'); });
    }

    (async () => {
      const rows = await fetchSheet(C.TAB_PROJECTS);
      renderAll((rows && rows.length) ? rows : SAMPLE);
    })();
  </script>
</body>
</html>
